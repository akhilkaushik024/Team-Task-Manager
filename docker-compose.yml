version: '3.8'

services:
  couchdb:
    image: couchdb:3.3
    ports:
      - "5984:5984"
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=password
    volumes:
      - couchdb_data:/opt/couchdb/data

  backend:
    build: ./Backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CouchDB__Url=http://admin:password@couchdb:5984
    depends_on:
      - couchdb

  frontend:
    build: ./Frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  couchdb_data:
