<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">✦</div>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Join Team Task Manager and start collaborating</p>
    </div>

    <div class="alert-error" *ngIf="error">{{ error }}</div>
    <div class="alert-success" *ngIf="success">{{ success }}</div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" formControlName="name" placeholder="Enter Your Name" autocomplete="name">
      </div>
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" formControlName="email" placeholder="you@company.com" autocomplete="email">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Min. 6 characters" autocomplete="new-password">
      </div>
      <button type="submit" class="btn" style="width: 100%; justify-content: center; padding: 0.8rem;" [disabled]="registerForm.invalid || loading">
        <span *ngIf="loading">Creating account...</span>
        <span *ngIf="!loading">Create Account →</span>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a routerLink="/login">Sign in</a>
    </div>
  </div>
</div>
