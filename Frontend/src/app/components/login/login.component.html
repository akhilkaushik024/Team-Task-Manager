<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your Team Task Manager</p>
    </div>

    <div class="alert-error" *ngIf="error">{{ error }}</div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" formControlName="email" placeholder="you@company.com" autocomplete="email">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn" style="width: 100%; justify-content: center; padding: 0.8rem;" [disabled]="loginForm.invalid || loading">
        <span *ngIf="loading">Signing in...</span>
        <span *ngIf="!loading">Sign In →</span>
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a routerLink="/register">Create one</a>
    </div>
  </div>
</div>
