<div class="container">
  <div class="page-header">
    <div>
      <h1 class="title">Projects</h1>
      <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem;">{{ projects.length }} project{{ projects.length !== 1 ? 's' : '' }}</p>
    </div>
    <button class="btn" *ngIf="isAdmin" (click)="showForm = !showForm">
      {{ showForm ? '✕ Cancel' : '＋ New Project' }}
    </button>
  </div>

  <!-- Create form -->
  <div class="form-panel" *ngIf="showForm && isAdmin">
    <h3 style="font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem; color: var(--text);">Create New Project</h3>
    <form [formGroup]="projectForm" (ngSubmit)="onSubmit()">
      <div class="grid-2">
        <div class="input-group">
          <label>Project Name</label>
          <input type="text" formControlName="name" placeholder="e.g. Website Redesign">
        </div>
        <div class="input-group">
          <label>Description</label>
          <input type="text" formControlName="description" placeholder="Brief description (optional)">
        </div>
      </div>
      <button class="btn" type="submit" [disabled]="projectForm.invalid">Create Project →</button>
    </form>
  </div>

  <!-- Empty state -->
  <div class="empty-state" *ngIf="projects.length === 0">
    <div class="empty-state-icon">🗂️</div>
    <h3>No projects yet</h3>
    <p *ngIf="isAdmin">Click "New Project" above to get started</p>
    <p *ngIf="!isAdmin">No projects have been created yet</p>
  </div>

  <!-- Projects grid -->
  <div class="grid" *ngIf="projects.length > 0">
    <div class="project-card" *ngFor="let p of projects">
      <div style="display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem;">
        <div style="width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, rgba(99,102,241,0.25), rgba(139,92,246,0.25)); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0;">📁</div>
      </div>
      <div class="project-name" style="margin-top: 0.75rem;">{{ p.name }}</div>
      <div class="project-desc">{{ p.description || 'No description provided.' }}</div>
      <div class="project-footer" *ngIf="isAdmin">
        <button class="btn btn-danger" style="padding: 0.35rem 0.9rem; font-size: 0.8rem;" (click)="deleteProject(p.id)">Delete</button>
      </div>
    </div>
  </div>
</div>
