<nav style="background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.5); padding: 0 1.5rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);">
  <a routerLink="/dashboard" style="display: flex; align-items: center; gap: 0.6rem; text-decoration: none;">
    <span style="width: 30px; height: 30px; background: var(--primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: white;">⚡</span>
    <span style="font-weight: 800; font-size: 1rem; color: var(--text); letter-spacing: -0.01em;">TeamTask</span>
  </a>

  <div style="display: flex; align-items: center; gap: 0.25rem;" *ngIf="currentUser$ | async as user">
    <a routerLink="/dashboard" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Dashboard</a>
    <a routerLink="/projects" routerLinkActive="nav-active" class="nav-link">Projects</a>
    <a routerLink="/tasks" routerLinkActive="nav-active" class="nav-link">Tasks</a>
    <a *ngIf="user.role === 'Admin'" routerLink="/users" routerLinkActive="nav-active" class="nav-link">Users</a>

    <div style="width: 1px; height: 20px; background: var(--border); margin: 0 0.75rem;"></div>

    <div style="display: flex; align-items: center; gap: 0.75rem;">
      <span style="font-size: 0.85rem; font-weight: 500; color: var(--text-muted);">
        {{ user.name }}
        <span *ngIf="user.role === 'Admin'" class="badge badge-admin" style="margin-left: 0.3rem; padding: 0.15rem 0.4rem; font-size: 0.65rem;">Admin</span>
      </span>
      <button (click)="logout()" class="nav-logout-btn">Logout</button>
    </div>
  </div>
</nav>
