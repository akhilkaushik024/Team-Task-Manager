server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 8.8.8.8 8.8.4.4 valid=30s ipv6=off;

    location /api/ {
        set $backend "https://vigilant-freedom-production.up.railway.app";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host vigilant-freedom-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_ssl_name vigilant-freedom-production.up.railway.app;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
